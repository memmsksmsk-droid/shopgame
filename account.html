<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Tài Khoản | BACH SHOP</title>
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0d6efd;
            --bg-body: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Be Vietnam Pro', sans-serif; 
            color: var(--text-main);
        }

        /* Navbar Custom */
        .navbar-custom { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 12px 0; }
        
        /* Premium Cards */
        .content-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            padding: 25px;
            margin-bottom: 20px;
        }

        /* Sidebar Navigation */
        .account-sidebar .nav-link {
            color: var(--text-muted);
            border-radius: 12px;
            font-weight: 600;
            padding: 14px 18px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .account-sidebar .nav-link:hover { background: #f8fafc; color: var(--primary); border: 1px solid #e2e8f0; }
        .account-sidebar .nav-link.active { 
            background: var(--primary); 
            color: #ffffff; 
            box-shadow: 0 8px 16px rgba(13, 110, 253, 0.2); 
        }

        /* Balance Highlight */
        .balance-badge {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            display: inline-block;
        }

        /* Tables */
        .table thead { background: #f8fafc; }
        .table { border-radius: 8px; overflow: hidden; }
        
        /* Mobile adjustment */
        @media (max-width: 768px) {
            .sidebar-col { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light navbar-custom mb-4">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="home.html">
            <img src="logo.jpg" alt="logo" class="rounded-circle shadow-sm" style="width: 42px; height: 42px; object-fit: cover; border: 2px solid #0d6efd;">
            <span class="fw-bold text-dark" style="font-size: 1.3rem;">bach <span class="text-primary">shop</span></span>
        </a>
        <a href="home.html" class="btn btn-outline-secondary btn-sm px-3 rounded-pill fw-bold"><i class="fa-solid fa-arrow-left me-1"></i> Về Cửa Hàng</a>
    </div>
</nav>

<div class="container pb-5">
    <div class="row g-4">
        <!-- Sidebar Menu -->
        <div class="col-lg-3 sidebar-col">
            <div class="content-card text-center">
                <i class="fa-solid fa-circle-user text-primary mb-3" style="font-size: 60px;"></i>
                <h6 class="fw-bold text-dark mb-1" id="accEmail">...</h6>
                <div class="mt-3">
                    <span class="balance-badge" id="accBalance">0đ</span>
                </div>
            </div>

            <div class="content-card account-sidebar nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                <button class="nav-link text-start active" data-bs-toggle="pill" data-bs-target="#tab-password" type="button"><i class="fa-solid fa-key me-2"></i> Đổi mật khẩu</button>
                <button class="nav-link text-start" data-bs-toggle="pill" data-bs-target="#tab-history-deposit" type="button"><i class="fa-solid fa-money-bill-transfer me-2"></i> Lịch sử nạp</button>
                <button class="nav-link text-start" data-bs-toggle="pill" data-bs-target="#tab-history-order" type="button"><i class="fa-solid fa-basket-shopping me-2"></i> Lịch sử đơn hàng</button>
                <button class="nav-link text-start" data-bs-toggle="pill" data-bs-target="#tab-history-login" type="button"><i class="fa-solid fa-shield-halved me-2"></i> Nhật ký đăng nhập</button>
            </div>
        </div>

        <!-- Nội dung Tab -->
        <div class="col-lg-9">
            <div class="tab-content" id="v-pills-tabContent">
                
                <!-- TAB: ĐỔI MẬT KHẨU -->
                <div class="tab-pane fade show active" id="tab-password" role="tabpanel">
                    <div class="content-card">
                        <h5 class="fw-bold text-dark mb-4 pb-2 border-bottom"><i class="fa-solid fa-user-lock text-primary me-2"></i>Bảo mật tài khoản</h5>
                        <form id="changePassForm" class="w-md-75">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Mật khẩu hiện tại</label>
                                <input type="password" id="oldPass" class="form-control form-control-lg rounded-3" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Mật khẩu mới</label>
                                <input type="password" id="newPass" class="form-control form-control-lg rounded-3" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold text-muted small">Nhập lại mật khẩu mới</label>
                                <input type="password" id="confirmNewPass" class="form-control form-control-lg rounded-3" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg fw-bold px-4 rounded-3"><i class="fa-solid fa-floppy-disk me-2"></i>Lưu thay đổi</button>
                        </form>
                    </div>
                </div>

                <!-- TAB: LỊCH SỬ NẠP TIỀN -->
                <div class="tab-pane fade" id="tab-history-deposit" role="tabpanel">
                    <div class="content-card">
                        <h5 class="fw-bold text-dark mb-4 pb-2 border-bottom"><i class="fa-solid fa-clock-rotate-left text-success me-2"></i>Lịch sử Nạp Tiền</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Thời gian</th>
                                        <th>Hình thức</th>
                                        <th>Số tiền</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody id="depositTbody">
                                    <tr><td colspan="4" class="text-center text-muted py-3">Đang tải dữ liệu...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- TAB: LỊCH SỬ MUA HÀNG -->
                <div class="tab-pane fade" id="tab-history-order" role="tabpanel">
                    <div class="content-card">
                        <h5 class="fw-bold text-dark mb-4 pb-2 border-bottom"><i class="fa-solid fa-bag-shopping text-warning me-2"></i>Đơn hàng đã mua</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Thời gian</th>
                                        <th>Sản phẩm</th>
                                        <th>Thanh toán</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody id="orderTbody">
                                    <tr><td colspan="4" class="text-center text-muted py-3">Đang tải dữ liệu...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- TAB: LỊCH SỬ ĐĂNG NHẬP -->
                <div class="tab-pane fade" id="tab-history-login" role="tabpanel">
                    <div class="content-card">
                        <h5 class="fw-bold text-dark mb-4 pb-2 border-bottom"><i class="fa-solid fa-shield-cat text-secondary me-2"></i>Thiết bị truy cập</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead>
                                    <tr>
                                        <th>Tài khoản</th>
                                        <th>Thời gian</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody id="loginTbody">
                                    <tr><td colspan="3" class="text-center text-muted py-3">Không có nhật ký đăng nhập.</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD_8idShoCkxrEqFkTY4HZYEkTINtHbw7I",
        authDomain: "shopgame-b6cc6.firebaseapp.com",
        databaseURL: "https://shopgame-b6cc6-default-rtdb.firebaseio.com",
        projectId: "shopgame-b6cc6",
        storageBucket: "shopgame-b6cc6.firebasestorage.app",
        messagingSenderId: "597813903573",
        appId: "1:597813903573:web:3d64f5f96ad87bad95225c",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentEmail = localStorage.getItem('currentUserEmail');
    let currentUserKey = null;
    let actualPass = "";

    window.onload = function() {
        if (!currentEmail) { window.location.href = 'index.html'; return; }
        document.getElementById('accEmail').innerText = currentEmail;
        fetchUserData();
        fetchDepositHistory();
        fetchOrderHistory();
        fetchLoginHistory();
    };

    function fetchUserData() {
        db.ref('sys_users').orderByChild('email').equalTo(currentEmail).on('value', snap => {
            if(snap.exists()) {
                currentUserKey = Object.keys(snap.val())[0];
                const userData = snap.val()[currentUserKey];
                document.getElementById('accBalance').innerText = (userData.balance || 0).toLocaleString() + "đ";
                actualPass = atob(userData.pass);
            }
        });
    }

    function fetchDepositHistory() {
        db.ref('sys_cards').orderByChild('userEmail').equalTo(currentEmail).on('value', snap => {
            const tbody = document.getElementById('depositTbody');
            if(!snap.exists()) { tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Chưa có giao dịch.</td></tr>`; return; }
            const data = Object.values(snap.val()).reverse();
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td class="text-muted small">${item.time}</td>
                    <td class="fw-bold text-primary">${item.type}</td>
                    <td class="fw-bold text-success">+${parseInt(item.value).toLocaleString()}đ</td>
                    <td><span class="badge ${item.status === 'Thành công' ? 'bg-success' : 'bg-warning'}">${item.status}</span></td>
                </tr>
            `).join('');
        });
    }

    function fetchOrderHistory() {
        db.ref('sys_orders').orderByChild('userEmail').equalTo(currentEmail).on('value', snap => {
            const tbody = document.getElementById('orderTbody');
            if(!snap.exists()) { tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Chưa có lịch sử.</td></tr>`; return; }
            const data = Object.values(snap.val()).reverse();
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td class="text-muted small">${item.time}</td>
                    <td class="fw-bold">${item.productName} (x${item.count || 1})</td>
                    <td class="text-danger fw-bold">-${parseInt(item.totalPrice).toLocaleString()}đ</td>
                    <td><span class="badge bg-success">Hoàn tất</span></td>
                </tr>
            `).join('');
        });
    }

    function fetchLoginHistory() {
        let logs = JSON.parse(localStorage.getItem('sys_login_logs')) || [];
        let myLogs = logs.filter(l => l.email === currentEmail).reverse().slice(0, 10);
        const tbody = document.getElementById('loginTbody');
        if(myLogs.length === 0) return;
        tbody.innerHTML = myLogs.map(l => `
            <tr>
                <td class="text-primary fw-bold">${l.email}</td>
                <td class="text-muted small">${l.time}</td>
                <td><span class="badge bg-secondary">Thành công</span></td>
            </tr>
        `).join('');
    }

    document.getElementById('changePassForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const oldP = document.getElementById('oldPass').value;
        const newP = document.getElementById('newPass').value;
        const cfmP = document.getElementById('confirmNewPass').value;
        if (oldP !== actualPass) { alert("Mật khẩu hiện tại không chính xác!"); return; }
        if (newP !== cfmP) { alert("Mật khẩu mới không trùng khớp!"); return; }
        if (newP.length < 6) { alert("Mật khẩu phải từ 6 ký tự!"); return; }
        if (currentUserKey) {
            db.ref('sys_users/' + currentUserKey).update({ pass: btoa(newP) }).then(() => {
                alert("Đổi mật khẩu thành công!");
                localStorage.removeItem('currentUserEmail');
                window.location.href = 'index.html';
            });
        }
    });
</script>
</body>
</html>
