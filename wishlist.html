<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sản Phẩm Yêu Thích | ACC CLONE GAME</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0d6efd;
            --bg-light: #f8fafc;
            --text-main: #333333;
            --border-color: #e2e8f0;
        }

        body {
            background-color: #f8fafc;
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding-top: 90px;
        }

        /* --- NAVBAR --- */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(241, 245, 249, 0.3);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1050;
            padding: 10px 0;
        }

        .logo-text {
            font-size: 1.35rem;
            background: linear-gradient(135deg, #0d6efd 0%, #ff1493 50%, #0d6efd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-shop {
            font-weight: 900;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #ff1493 0%, #ff0080 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-box {
            background: rgba(248, 250, 252, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.3);
            border-radius: 50rem;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* --- PAGE HEADER --- */
        .page-header {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .page-header p {
            color: #64748b;
            margin: 0;
        }

        /* --- WISHLIST GRID --- */
        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .wishlist-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.3);
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .wishlist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .card-image-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f1ff 100%);
            position: relative;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-from-wishlist {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #ef4444;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .remove-from-wishlist:hover {
            background: #dc2626;
            transform: scale(1.1);
        }

        .card-content {
            padding: 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .card-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-desc {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .card-price {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ef4444;
            margin-bottom: 10px;
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .card-btn {
            padding: 8px 10px;
            border-radius: 6px;
            border: none;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn-view-detail {
            background: var(--primary-color);
            color: white;
        }

        .btn-view-detail:hover {
            background: #0052cc;
        }

        .btn-add-cart-quick {
            background: white;
            color: var(--primary-color);
            border: 1.5px solid var(--primary-color);
        }

        .btn-add-cart-quick:hover {
            background: var(--primary-color);
            color: white;
        }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 5rem;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .empty-text {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        /* --- STATS --- */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- FOOTER --- */
        footer {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(226, 232, 240, 0.3);
            padding: 40px 0;
            margin-top: 60px;
            color: #64748b;
            text-align: center;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .wishlist-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .card-image-wrapper {
                height: 140px;
            }

            .stats-section {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light navbar-custom">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="home.html">
            <img src="logo.jpg" alt="logo" class="rounded-circle shadow-sm" 
                 style="width: 42px; height: 42px; object-fit: cover; border: 2px solid #0d6efd;">
            <span class="logo-text fw-bold">bach <span class="logo-shop">shop</span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav ms-auto align-items-center gap-3 mt-3 mt-lg-0">
                <li class="nav-item">
                    <a href="home.html" class="user-box" style="background: #fff; text-decoration: none; color: #333;">
                        <i class="fa-solid fa-home me-1 text-primary"></i> Trang chủ
                    </a>
                </li>
                <li class="nav-item">
                    <a href="cart.html" class="user-box" style="background: #fff; text-decoration: none; color: #333;">
                        <i class="fa-solid fa-cart-shopping me-1 text-primary"></i> Giỏ hàng
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="main-content">
    <div class="container py-4">
        <div class="page-header">
            <h1><i class="fa-solid fa-heart me-2" style="color: #ef4444;"></i> Sản phẩm yêu thích</h1>
            <p>Tập hợp các sản phẩm bạn đã thích</p>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-number" id="totalWishlist">0</div>
                <div class="stat-label">Sản phẩm yêu thích</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalPrice">0đ</div>
                <div class="stat-label">Tổng giá trị</div>
            </div>
        </div>

        <div class="wishlist-grid" id="wishlistGrid"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">
                <i class="fa-regular fa-heart"></i>
            </div>
            <div class="empty-title">Danh sách yêu thích trống</div>
            <div class="empty-text">Hãy thêm những sản phẩm bạn yêu thích</div>
            <a href="home.html" class="btn btn-primary">
                <i class="fa-solid fa-shopping-bag me-1"></i> Khám phá sản phẩm
            </a>
        </div>
    </div>
</div>

<footer>
    <div class="container py-4">
        <p>&copy; 2026 ACC CLONE GAME Shop. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBjYZjKVUDuMGRKH0Fvd0Yx4ZjVRvFjrCY",
        authDomain: "ngbach-shop.firebaseapp.com",
        databaseURL: "https://ngbach-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ngbach-shop",
        storageBucket: "ngbach-shop.appspot.com",
        messagingSenderId: "652846893826",
        appId: "1:652846893826:web:9d0b57ab7cc4d9dd37ce34"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let wishlistItems = [];

    window.addEventListener('DOMContentLoaded', function() {
        loadWishlist();
    });

    function loadWishlist() {
        const wishlistIds = JSON.parse(localStorage.getItem('wishlist')) || [];
        
        if (wishlistIds.length === 0) {
            showEmptyState();
            return;
        }

        wishlistItems = [];
        let loaded = 0;

        wishlistIds.forEach(productId => {
            db.ref(`sys_products/${productId}`).once('value', snapshot => {
                const product = snapshot.val();
                if (product) {
                    wishlistItems.push({
                        id: productId,
                        ...product
                    });
                }
                loaded++;

                if (loaded === wishlistIds.length) {
                    displayWishlist();
                }
            });
        });
    }

    function displayWishlist() {
        if (wishlistItems.length === 0) {
            showEmptyState();
            return;
        }

        document.getElementById('emptyState').style.display = 'none';
        const grid = document.getElementById('wishlistGrid');
        grid.innerHTML = '';

        let totalPrice = 0;

        wishlistItems.forEach(item => {
            totalPrice += parseInt(item.price);
            
            const itemHTML = `
                <div class="wishlist-card">
                    <div class="card-image-wrapper">
                        <img src="${item.img}" class="card-image" alt="${item.name}">
                        <button class="remove-from-wishlist" onclick="removeFromWishlist('${item.id}')" title="Xóa khỏi yêu thích">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                    <div class="card-content">
                        <div class="card-name">${item.name}</div>
                        <div class="card-desc">${item.desc || 'Sản phẩm chất lượng'}</div>
                        <div class="card-price">${parseInt(item.price).toLocaleString()}đ</div>
                        <div class="card-actions">
                            <button class="card-btn btn-view-detail" onclick="viewProduct('${item.id}')">
                                <i class="fa-solid fa-eye"></i> Xem
                            </button>
                            <button class="card-btn btn-add-cart-quick" onclick="addToCartFromWishlist('${item.id}')">
                                <i class="fa-solid fa-cart-plus"></i> Thêm
                            </button>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += itemHTML;
        });

        document.getElementById('totalWishlist').textContent = wishlistItems.length;
        document.getElementById('totalPrice').textContent = totalPrice.toLocaleString() + 'đ';
    }

    function showEmptyState() {
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('wishlistGrid').innerHTML = '';
        document.getElementById('totalWishlist').textContent = '0';
        document.getElementById('totalPrice').textContent = '0đ';
    }

    function removeFromWishlist(productId) {
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        wishlist = wishlist.filter(id => id !== productId);
        localStorage.setItem('wishlist', JSON.stringify(wishlist));
        loadWishlist();
    }

    function viewProduct(productId) {
        window.location.href = `product-detail.html?id=${productId}`;
    }

    function addToCartFromWishlist(productId) {
        const product = wishlistItems.find(p => p.id === productId);
        if (!product) return;

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let found = false;

        for (let item of cart) {
            if (item.id === productId) {
                item.qty++;
                found = true;
                break;
            }
        }

        if (!found) {
            cart.push({
                id: productId,
                name: product.name,
                price: product.price,
                img: product.img,
                qty: 1
            });
        }

        localStorage.setItem('cart', JSON.stringify(cart));
        alert('Đã thêm vào giỏ hàng!');
    }
</script>

</body>
</html>
