<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giỏ Hàng | ACC CLONE GAME</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0d6efd;
            --bg-light: #f8fafc;
            --text-main: #333333;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding-top: 90px;
            padding-bottom: 50px;
        }

        /* --- THANH MENU --- */
        .navbar-custom {
            background: #ffffff;
            border-bottom: 1px solid #f1f5f9;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1050;
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
            padding: 10px 0;
        }

        .navbar-brand {
            font-weight: bold;
            color: var(--primary-color) !important;
        }

        .user-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 50rem;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }
        .user-box:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .cart-table {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .cart-table table {
            margin-bottom: 0;
        }

        .cart-table thead {
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
        }

        .cart-table th {
            font-weight: bold;
            color: #64748b;
            padding: 15px !important;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .cart-table td {
            padding: 15px !important;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }

        .product-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .product-img-small {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .product-info h6 {
            margin-bottom: 4px;
            font-weight: bold;
            color: #111;
        }

        .product-info small {
            color: #64748b;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 4px 8px;
            width: fit-content;
        }

        .qty-control button {
            background: #f8fafc;
            border: none;
            width: 24px;
            height: 24px;
            padding: 0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .qty-control button:hover {
            background: #e2e8f0;
            color: var(--primary-color);
        }

        .qty-control input {
            width: 30px;
            text-align: center;
            border: none;
            font-weight: bold;
            padding: 0;
        }

        .price-cell {
            font-weight: bold;
            color: #ef4444;
            font-size: 1.1rem;
        }

        .delete-btn {
            color: #ef4444;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            opacity: 0.7;
            transform: scale(1.1);
        }

        .summary-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #e2e8f0;
        }

        .summary-item:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .summary-item label {
            color: #64748b;
            font-weight: 500;
            margin-bottom: 0;
        }

        .summary-item span {
            font-weight: bold;
            color: #111;
        }

        .summary-item.total span {
            color: #ef4444;
            font-size: 1.3rem;
        }

        .coupon-section {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .coupon-section label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #475569;
            display: block;
            margin-bottom: 8px;
        }

        .coupon-section .input-group {
            gap: 8px;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 12px;
        }

        .empty-cart i {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 20px;
            display: block;
        }

        .empty-cart h3 {
            color: #64748b;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .empty-cart a {
            display: inline-block;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .action-buttons button {
            flex: 1;
        }

        footer {
            background: #ffffff;
            border-top: 1px solid var(--border-color);
            padding: 20px 0;
            margin-top: 40px;
            font-size: 0.85rem;
            color: #64748b;
        }

        @media (max-width: 768px) {
            .main-content { padding-top: 75px; }
            
            .cart-table table {
                font-size: 0.85rem;
            }

            .cart-table th,
            .cart-table td {
                padding: 10px !important;
            }

            .product-cell {
                flex-direction: column;
                align-items: flex-start;
            }

            .product-img-small {
                width: 50px;
                height: 50px;
            }

            .product-info h6 {
                font-size: 0.9rem;
            }

            .action-buttons {
                flex-direction: column;
            }

            .action-buttons button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light navbar-custom">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="home.html">
            <img src="logo.jpg" alt="ngbach shop logo" class="rounded-circle shadow-sm" 
                 style="width: 42px; height: 42px; object-fit: cover; border: 2px solid #0d6efd;">
            <span class="fw-bold text-dark" style="font-family: 'Segoe UI', sans-serif; letter-spacing: 0.5px; font-size: 1.3rem;">
                bach <span class="text-primary">shop</span>
            </span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav ms-auto align-items-center gap-3 mt-3 mt-lg-0">
                <li class="nav-item">
                    <div class="user-box text-danger fw-bold shadow-sm" style="background: #fff;">
                        <i class="fa-solid fa-wallet me-1"></i> <span id="userBalanceText">0đ</span>
                    </div>
                </li>
                
                <li class="nav-item">
                    <a href="home.html" class="user-box shadow-sm text-primary fw-bold" style="background: #fff; text-decoration: none;">
                        <i class="fa-solid fa-arrow-left me-1"></i> Quay lại
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container main-content">
    <div class="mb-4">
        <h3 class="fw-bold text-dark mb-1"><i class="fa-solid fa-cart-shopping text-primary me-2"></i>Giỏ Hàng Của Bạn</h3>
        <p class="text-muted small" id="cartStatusText">Đang tải...</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div id="cartContainer">
                <div class="text-center text-muted py-5">
                    <i class="fa-solid fa-spinner fa-spin fs-3"></i>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="summary-card sticky-lg-top" style="top: 110px;">
                <h6 class="fw-bold text-dark mb-4">Tóm Tắt Đơn Hàng</h6>

                <div class="coupon-section">
                    <label for="couponInput">Mã giảm giá (Coupon):</label>
                    <div class="input-group input-group-sm">
                        <input type="text" id="couponInput" class="form-control" placeholder="Ví dụ: bach10">
                        <button id="couponBtn" onclick="applyCoupon()" class="btn btn-secondary btn-sm px-3">Áp dụng</button>
                    </div>
                    <div id="couponMessage" class="small mt-2" style="display:none; font-weight: bold;"></div>
                </div>

                <div class="summary-item">
                    <label>Tạm tính:</label>
                    <span id="subtotalPrice">0đ</span>
                </div>

                <div class="summary-item" id="discountRow" style="display: none;">
                    <label>Giảm giá (<span id="discountPercent">0</span>%):</label>
                    <span id="discountAmount" class="text-success">-0đ</span>
                </div>

                <div class="summary-item total">
                    <label>Tổng thanh toán:</label>
                    <span id="totalPrice">0đ</span>
                </div>

                <button id="checkoutBtn" onclick="proceedCheckout()" class="btn btn-primary w-100 py-3 fw-bold text-uppercase mt-4" style="border-radius: 8px;">
                    <i class="fa-solid fa-wallet me-2"></i> Mua Ngay
                </button>

                <button onclick="history.back()" class="btn btn-outline-secondary w-100 py-2 fw-bold text-uppercase mt-2" style="border-radius: 8px;">
                    <i class="fa-solid fa-arrow-left me-2"></i> Tiếp Tục Mua Hàng
                </button>
            </div>
        </div>
    </div>
</div>

<footer class="text-center mt-5">
    <div class="container">
        <p class="mb-1 fw-bold text-dark opacity-75">HỆ THỐNG PHÂN PHỐI BẢN QUYỀN ADMIN TRẦN BÁCH </p>
        <p class="m-0">© 2026 CHEAT VN. All Rights Reserved.</p>
    </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const firebaseConfig = {
       apiKey: "AIzaSyD_8idShoCkxrEqFkTY4HZYEkTINtHbw7I",
       authDomain: "shopgame-b6cc6.firebaseapp.com",
       databaseURL: "https://shopgame-b6cc6-default-rtdb.firebaseio.com",
       projectId: "shopgame-b6cc6",
       storageBucket: "shopgame-b6cc6.firebasestorage.app",
       messagingSenderId: "597813903573",
       appId: "1:597813903573:web:3d64f5f96ad87bad95225c",
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [];
    let discountPercent = 0;
    let currentEmail = '';

    window.onload = function() {
        currentEmail = localStorage.getItem('currentUserEmail');
        if(!currentEmail) { window.location.href = 'index.html'; return; }

        // Lấy giỏ hàng từ localStorage
        const savedCart = localStorage.getItem('sys_cart');
        const savedDiscount = localStorage.getItem('sys_cart_discount');
        
        if (savedCart) cart = JSON.parse(savedCart);
        if (savedDiscount) discountPercent = parseInt(savedDiscount);

        // Lấy thông tin người dùng
        db.ref('sys_users').orderByChild('email').equalTo(currentEmail).on('value', snap => {
            if(snap.exists()) {
                const userData = Object.values(snap.val())[0];
                document.getElementById('userBalanceText').innerText = (userData.balance || 0).toLocaleString() + "đ";
            }
        });

        renderCart();
    };

    function renderCart() {
        const container = document.getElementById('cartContainer');

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-cart">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <h3>Giỏ Hàng Trống</h3>
                    <p>Bạn chưa thêm sản phẩm nào vào giỏ hàng</p>
                    <a href="home.html" class="btn btn-primary px-5">
                        <i class="fa-solid fa-arrow-left me-2"></i> Tiếp Tục Mua Hàng
                    </a>
                </div>
            `;
            document.getElementById('cartStatusText').innerHTML = `<i class="fa-solid fa-circle text-warning me-2"></i> Giỏ hàng của bạn trống`;
            updateSummary();
            return;
        }

        document.getElementById('cartStatusText').innerHTML = `<i class="fa-solid fa-check-circle text-success me-2"></i> Bạn có <strong>${cart.length}</strong> sản phẩm trong giỏ`;

        const tableHTML = `
            <div class="cart-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th style="width: 120px;">Giá</th>
                            <th style="width: 120px;">Số lượng</th>
                            <th style="width: 120px;">Tổng</th>
                            <th style="width: 50px;"></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${cart.map(item => `
                            <tr>
                                <td>
                                    <div class="product-cell">
                                        <img src="${item.img}" alt="${item.name}" class="product-img-small">
                                        <div class="product-info">
                                            <h6>${item.name}</h6>
                                            <small>${item.desc}</small>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <span class="price-cell">${parseInt(item.price).toLocaleString()}đ</span>
                                </td>
                                <td>
                                    <div class="qty-control">
                                        <button onclick="changeQty('${item.id}', -1)">-</button>
                                        <input type="text" value="${item.count}" readonly>
                                        <button onclick="changeQty('${item.id}', 1)">+</button>
                                    </div>
                                </td>
                                <td>
                                    <span class="price-cell">${(parseInt(item.price) * item.count).toLocaleString()}đ</span>
                                </td>
                                <td>
                                    <i class="fa-solid fa-trash delete-btn" onclick="removeFromCart('${item.id}')"></i>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;

        container.innerHTML = tableHTML;
        updateSummary();
    }

    function changeQty(productId, delta) {
        const item = cart.find(p => p.id === productId);
        if (!item) return;

        item.count += delta;
        if (item.count <= 0) removeFromCart(productId);
        else {
            localStorage.setItem('sys_cart', JSON.stringify(cart));
            renderCart();
        }
    }

    function removeFromCart(productId) {
        if (confirm("Bạn có chắc muốn xóa sản phẩm này?")) {
            cart = cart.filter(p => p.id !== productId);
            localStorage.setItem('sys_cart', JSON.stringify(cart));
            renderCart();
        }
    }

    function updateSummary() {
        let subtotal = 0;
        cart.forEach(item => {
            subtotal += parseInt(item.price) * item.count;
        });

        const discountAmount = Math.floor((subtotal * discountPercent) / 100);
        const total = subtotal - discountAmount;

        document.getElementById('subtotalPrice').innerText = subtotal.toLocaleString() + 'đ';
        document.getElementById('totalPrice').innerText = total.toLocaleString() + 'đ';

        if (discountPercent > 0) {
            document.getElementById('discountRow').style.display = 'flex';
            document.getElementById('discountPercent').innerText = discountPercent;
            document.getElementById('discountAmount').innerText = '-' + discountAmount.toLocaleString() + 'đ';
        } else {
            document.getElementById('discountRow').style.display = 'none';
        }
    }

    function applyCoupon() {
        const couponCode = document.getElementById('couponInput').value.trim().toUpperCase();
        const messageEl = document.getElementById('couponMessage');

        if (!couponCode) {
            messageEl.style.display = 'none';
            return;
        }

        // Lấy dữ liệu coupon từ Firebase
        db.ref('sys_coupons').orderByChild('code').equalTo(couponCode).once('value', snap => {
            if (!snap.exists()) {
                messageEl.innerHTML = '<i class="fa-solid fa-circle-xmark me-1 text-danger"></i> Mã giảm giá không hợp lệ';
                messageEl.className = 'small mt-2 text-danger';
                messageEl.style.display = 'block';
                discountPercent = 0;
            } else {
                const coupon = Object.values(snap.val())[0];
                discountPercent = coupon.percent || 0;
                messageEl.innerHTML = `<i class="fa-solid fa-circle-check me-1 text-success"></i> Giảm giá ${discountPercent}% thành công!`;
                messageEl.className = 'small mt-2 text-success';
                messageEl.style.display = 'block';
            }
            localStorage.setItem('sys_cart_discount', discountPercent);
            updateSummary();
        });
    }

    function proceedCheckout() {
        if (cart.length === 0) {
            alert("Giỏ hàng rỗng!");
            return;
        }

        // Tính tổng tiền
        let subtotal = 0;
        cart.forEach(item => {
            subtotal += parseInt(item.price) * item.count;
        });
        const discountAmount = Math.floor((subtotal * discountPercent) / 100);
        const total = subtotal - discountAmount;

        // Lưu thông tin đơn hàng
        const orderData = {
            email: currentEmail,
            items: cart,
            subtotal: subtotal,
            discountPercent: discountPercent,
            discountAmount: discountAmount,
            total: total,
            date: new Date().toLocaleString()
        };

        localStorage.setItem('orderData', JSON.stringify(orderData));
        window.location.href = 'checkout.html';
    }
</script>
</body>
</html>
